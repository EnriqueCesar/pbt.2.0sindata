<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBT Web 2.0 Manual | PBT.24 Original</title>
<style>
:root{--green:#00754a;--green2:#006241;--line:#b9b9b9;--ok:#dff3e7;--bad:#ffe1e1;--text:#1f1f1f}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f5f5f5;color:var(--text)}
.header{background:var(--green);color:white;padding:14px 18px;font-size:22px;font-weight:900;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.logo{font-size:24px}.badge{background:white;color:var(--green);padding:7px 12px;border-radius:999px;font-size:13px;font-weight:900}.container{max-width:1500px;margin:auto;padding:12px}.tabs{display:flex;gap:10px;margin-bottom:12px;position:sticky;top:0;z-index:50;background:#f5f5f5;padding:8px 0}.tab{flex:1;border:none;background:#ddd;color:#111;padding:14px;border-radius:14px;font-weight:900;font-size:15px;cursor:pointer}.tab.active{background:var(--green);color:white}.page{display:none}.page.active{display:block}.periodo-row{display:grid;grid-template-columns:1.15fr 1fr;gap:12px;margin-bottom:12px}.periodo-table{display:grid;grid-template-columns:170px 1fr;border:1px solid var(--line);background:white;border-radius:10px;overflow:hidden}.periodo-table .head{grid-column:1/3;background:var(--green);color:white;padding:7px;font-weight:900;text-align:center}.periodo-table label{padding:8px 10px;font-style:italic;border-top:1px solid #ddd}.periodo-table input{border:none;border-top:1px solid #ddd;background:#d9d9d9;padding:8px;font-weight:700}.manual-top{display:grid;grid-template-columns:1fr 1.45fr 2fr;gap:12px;align-items:start;margin-bottom:12px}.box{background:white;border:1px solid var(--line);border-radius:10px;overflow:hidden}.box-title{background:var(--green);color:white;text-align:center;padding:7px;font-weight:900;font-size:14px}.box-body{padding:8px}.metric-grid{display:grid;gap:6px}.channels-cafe{grid-template-columns:repeat(2,1fr)}.channels-dt{grid-template-columns:repeat(3,1fr)}.mix-grid{grid-template-columns:repeat(5,1fr)}.metric{border:1px solid #c9c9c9;background:#f6f6f6;padding:6px;text-align:center}.metric label{display:block;font-size:12px;font-weight:900;margin-bottom:4px}.metric input,.manual-input{width:100%;border:none;background:#e6e6e6;text-align:center;font-size:16px;font-weight:900;padding:5px;color:var(--green)}.manual-input{border:1px solid #aaa;color:#111}.cell-tag{display:none!important}.total{margin-top:6px;padding:6px;text-align:center;border-radius:8px;font-weight:900}.ok{background:var(--ok);color:var(--green)}.bad{background:var(--bad);color:#a40000}.action-row{display:flex;gap:10px;align-items:stretch;justify-content:space-between;margin-top:8px;flex-wrap:wrap}.update-btn{flex:1 1 260px;border:none;background:var(--green);color:white;padding:10px 12px;border-radius:10px;font-weight:900;font-size:13px;cursor:pointer;box-shadow:0 2px 4px rgba(0,0,0,.14)}.update-btn:hover{background:var(--green2)}.fecha-box{flex:0 0 320px;background:white;border:1px solid var(--line);border-radius:10px;padding:7px 10px;display:grid;grid-template-columns:90px 1fr;grid-template-rows:auto auto;column-gap:8px;align-items:center}.fecha-box label{grid-row:1/span 2;color:var(--green2);font-size:13px;font-weight:900}.fecha-box input{width:100%;border:1px solid #bbb;border-radius:6px;padding:5px;font-size:13px}.fecha-texto{margin-top:3px;color:var(--green2);font-size:12px;font-weight:900;text-transform:capitalize}.status-msg{margin-top:6px;padding:7px;border-radius:8px;text-align:center;font-size:12px;font-weight:900}.status-msg.ok{display:none}.status-msg.bad{display:block}.section-title{background:var(--green);color:white;padding:10px;border-radius:10px 10px 0 0;font-weight:900;margin-top:12px}.layout-wrap{background:white;border:2px solid #222;border-radius:0 0 10px 10px;overflow:hidden}.excel-grid{height:430px;display:grid;grid-template-columns:repeat(14,1fr);grid-template-rows:repeat(11,1fr);position:relative;background:#fff}.excel-grid.cafe-grid{height:315px;grid-template-rows:repeat(8,1fr)}.excel-grid.dt-grid{height:430px;grid-template-rows:repeat(11,1fr)}.cell{border:1px solid #111;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:900;font-size:12px;overflow:hidden}.cell.empty{border:none}.cell.partner{background:#00704a!important;color:white;font-size:24px}.cell.support{background:white!important;color:#00704a;border:1px solid #00704a;font-size:24px}.cell.whiteText{color:white}.muted{font-size:11px}.table-wrap{overflow-x:auto}details{background:white;border:1px solid var(--line);border-radius:10px;margin-top:4px;overflow:hidden}summary{background:var(--green);color:white;padding:10px;font-weight:900;cursor:pointer}table{width:100%;border-collapse:collapse;min-width:700px}th{background:#006241;color:white;padding:7px;font-size:12px}td{border:1px solid #777;padding:7px;font-size:12px}.excel-note{font-size:11px;color:#006241;font-weight:900;margin-top:4px;text-align:right}
@media(max-width:760px){.header{font-size:18px;padding:12px}.logo{font-size:20px}.tabs{overflow-x:auto}.tab{min-width:150px;padding:12px}.manual-top,.periodo-row{grid-template-columns:1fr}.mix-grid{grid-template-columns:repeat(2,1fr)}.channels-cafe,.channels-dt{grid-template-columns:repeat(2,1fr)}.fecha-box{flex:1 1 100%;grid-template-columns:70px 1fr}.excel-grid{height:300px}.cell{font-size:8px}.cell.partner,.cell.support{font-size:14px}}
</style>
</head>
<body>
<header class="header"><div class="logo">☕ PBT Web 2.0</div><div class="badge">Manual | PBT.24 Original</div></header>
<div class="container"><div class="tabs"><button class="tab active" id="tabCafe" onclick="showTab('cafe')">CAFE</button><button class="tab" id="tabDt" onclick="showTab('dt')">DRIVE THRU</button></div><section id="cafe" class="page active"></section><section id="dt" class="page"></section></div>
<script src="pbt24_original_data.js"></script>
<script>
let activeTab='cafe';
const state={cafe:{partners:4,channels:[68,32,0],mix:[36,2,27,21,14]},dt:{partners:11,channels:[20,12,68],mix:[40,3,21,31,5],partnerTablet:'No'}};
const labels={cafe:{title:'CAFE',max:11,channels:['Lobby','Pick up & Delivery'],channelCells:['G14','H14']},dt:{title:'DRIVE THRU',max:13,channels:['Lobby','Pick up & Delivery','DT'],channelCells:['G14','H14','I14']}};
const mixLabels=['Espresso','Café Filtrado','CBS','Food','Otro'];
const mixCells=['K14','L14','M14','N14','O14'];
function round0(v){v=Number(v||0);return Number.isFinite(v)?Math.round(v):0}
function pct(v){return round0(v)+'%'}
function capFecha(txt){return txt.replace(/(^|\s)([a-záéíóúñ])/g,(m,e,l)=>e+l.toUpperCase())}
function setFecha(tab){const input=document.getElementById(tab+'_fecha'); if(!input)return; sessionStorage.setItem(tab+'_fecha',input.value); const d=new Date(input.value+'T00:00:00'); const t=input.value?capFecha(d.toLocaleDateString('es-MX',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})):'Sin fecha seleccionada'; document.getElementById(tab+'_fechaTxt').textContent=t}
function cargarFecha(tab){const input=document.getElementById(tab+'_fecha'); input.value=sessionStorage.getItem(tab+'_fecha')||new Date().toISOString().slice(0,10); setFecha(tab)}
function readInputs(tab){const c=labels[tab]; state[tab].partners=round0(document.getElementById(tab+'_partners').value); if(tab==='dt'){const pt=document.getElementById(tab+'_partnerTablet'); state[tab].partnerTablet=pt?pt.value:'No';} state[tab].channels=c.channels.map((_,i)=>round0(document.getElementById(`${tab}_ch_${i}`).value)); if(tab==='cafe')state[tab].channels[2]=0; state[tab].mix=mixLabels.map((_,i)=>round0(document.getElementById(`${tab}_mix_${i}`).value));}
function validate(tab){const c=labels[tab]; const chSum=c.channels.reduce((s,_,i)=>s+round0(document.getElementById(`${tab}_ch_${i}`).value),0); const mixSum=mixLabels.reduce((s,_,i)=>s+round0(document.getElementById(`${tab}_mix_${i}`).value),0); const ch=document.getElementById(tab+'_channelTotal'), mx=document.getElementById(tab+'_mixTotal'); ch.textContent='Total: '+chSum+'%'; mx.textContent='Total: '+mixSum+'%'; ch.className=chSum===100?'total ok':'total bad'; mx.className=mixSum===100?'total ok':'total bad'; return chSum===100&&mixSum===100;}
function nearest(tab,vals){const arr=PBT24_DATA.mixes[tab]; let best=arr[0], bestD=Infinity; for(const row of arr){let d=0; for(let i=0;i<8;i++){const diff=vals[i]-row[i]; d+=diff*diff;} if(d<bestD){bestD=d;best=row;if(d===0)break;}} return best;}
function keyFor(tab){const s=state[tab]; const vals=[s.channels[0],s.channels[1],s.channels[2],s.mix[0],s.mix[1],s.mix[2],s.mix[3],s.mix[4]]; const near=nearest(tab,vals); return {near,play:PBT24_DATA.plays[tab][s.partners+'|'+near.join(',')]||''};}
function buildPage(tab){const c=labels[tab];document.getElementById(tab).innerHTML=`
<div class="periodo-row"><div class="periodo-table"><div class="head">Periodo de tiempo</div><label>Rango de fechas <span class="cell-tag">D8</span></label><input id="${tab}_rango" placeholder="Ej. 05/06/2026 - 11/06/2026"><label>Días de la semana <span class="cell-tag">D9</span></label><input id="${tab}_dias" placeholder="Ej. Lunes a viernes"><label>Turno <span class="cell-tag">D10</span></label><input id="${tab}_turno" placeholder="Ej. Morning / Lunch / Afternoon"></div><div></div></div>
<div class="manual-top"><div class="box"><div class="box-title">Información de turno</div><div class="box-body"><div class="metric-grid"><div class="metric"><label>Partners <span class="cell-tag">D14</span></label><select class="manual-input" id="${tab}_partners" onchange="validate('${tab}')">${Array.from({length:c.max},(_,i)=>`<option value="${i+1}" ${(i+1)===state[tab].partners?'selected':''}>${i+1}</option>`).join('')}</select></div>${tab==='dt'?`<div class="metric"><label>Partner Tablet <span class="cell-tag">D15</span></label><select class="manual-input" id="${tab}_partnerTablet" onchange="actualizarPlan('${tab}')"><option value="No" ${state[tab].partnerTablet!=='Sí'?'selected':''}>No</option><option value="Sí" ${state[tab].partnerTablet==='Sí'?'selected':''}>Sí</option></select></div>`:''}</div></div></div></div>
<div class="box"><div class="box-title">Distribución de canales</div><div class="box-body"><div class="metric-grid ${tab==='cafe'?'channels-cafe':'channels-dt'}">${c.channels.map((x,i)=>`<div class="metric"><label>${x} <span class="cell-tag">${c.channelCells[i]}</span></label><input type="number" step="1" min="0" max="100" id="${tab}_ch_${i}" value="${state[tab].channels[i]}" oninput="validate('${tab}')"></div>`).join('')}</div><div class="total ok" id="${tab}_channelTotal">Total: 100%</div></div></div>
<div class="box"><div class="box-title">Mix de productos</div><div class="box-body"><div class="metric-grid mix-grid">${mixLabels.map((x,i)=>`<div class="metric"><label>${x} <span class="cell-tag">${mixCells[i]}</span></label><input type="number" step="1" min="0" max="100" id="${tab}_mix_${i}" value="${state[tab].mix[i]}" oninput="validate('${tab}')"></div>`).join('')}</div><div class="total ok" id="${tab}_mixTotal">Total: 100%</div></div></div></div>
<div class="action-row"><button class="update-btn" onclick="actualizarPlan('${tab}')">↻ Actualizar Plan</button><div class="fecha-box"><label for="${tab}_fecha">Fecha</label><input type="date" id="${tab}_fecha" onchange="setFecha('${tab}')"><div class="fecha-texto" id="${tab}_fechaTxt"></div></div></div><div class="status-msg ok" id="${tab}_status">Base lista.</div>
<div class="section-title">Plan de distribución recomendado — ${c.title}</div><div class="layout-wrap"><div class="excel-grid" id="${tab}_grid"></div></div>
<details open><summary>Rutinas de Partners</summary><div class="table-wrap"><table><thead><tr><th>Partner</th><th>Estación</th><th>Fijo</th><th>Rutinas</th></tr></thead><tbody id="${tab}_tbody"></tbody></table></div></details>`; validate(tab); cargarFecha(tab); render(tab);}
function cellStyle(it){let s=`grid-row:${it.r-16}/span ${it.rs};grid-column:${it.c-1}/span ${it.cs};`; if(it.fill&&it.fill!=='transparent')s+=`background:${it.fill};`; return s;}
function isDark(fill){return ['#695346','#8c7861','#00704a','#007050','#685347'].includes((fill||'').toLowerCase())}
function render(tab){
  const data=keyFor(tab);
  const play=data.play;
  const tmpl=PBT24_DATA.templates[tab];
  const coords=PBT24_DATA.coords[play]||{};
  const sourceRoutines=PBT24_DATA.routines[play]||[];
  const tabletOn=tab==='dt' && state.dt.partnerTablet==='Sí';
  const routines=sourceRoutines.map(r=>{
    const row=[...r];
    if(tabletOn && row[0]==='B'){
      row[1]=(row[1]||'')+' + Carril';
      row[3]=(row[3]||'')+' + Tablet';
    }
    return row;
  });
  const supportByPartner={};
  routines.forEach(r=>supportByPartner[r[0]]=r[4]===1);
  const grid=document.getElementById(tab+'_grid');
  grid.className='excel-grid '+(tab==='cafe'?'cafe-grid':'dt-grid');
  const visibleItems=tmpl.items.filter(it=>it.r!==17 && !(tab==='cafe'&&it.r>=25&&it.r<=27));
  const tabletMoveValue=tabletOn ? (coords[`${tmpl.layout}:3:4`]||'') : '';
  grid.innerHTML=visibleItems.map(it=>{
    let value=it.v||'';
    let cls='cell';
    let style=cellStyle(it);
    if(tabletOn && it.r===20 && it.c===5){return '';} // E20 queda vacío cuando Partner Tablet = Sí
    if(tabletOn && it.r===17 && it.c===10 && tabletMoveValue){
      value=tabletMoveValue;
      cls+=' '+(supportByPartner[value]?'support':'partner');
    } else if(it.dyn){
      const coordKey=`${tmpl.layout}:${it.r-17}:${it.c-1}`;
      value=coords[coordKey]||'';
      if(!value)return '';
      cls+=' '+(supportByPartner[value]?'support':'partner');
    } else if(!value && (!it.fill || it.fill==='transparent')) cls+=' empty';
    if(isDark(it.fill)&&!it.dyn)cls+=' whiteText';
    return `<div class="${cls}" style="${style}">${value}</div>`;
  }).join('');
  document.getElementById(tab+'_tbody').innerHTML=routines.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('') || '<tr><td colspan="4">Sin recomendación para la configuración actual.</td></tr>';
  document.getElementById(tab+'_status').textContent=play?`Plan original PBT.24 aplicado: ${play} | Mix cercano: ${data.near.join('% / ')}%${tabletOn?' | Partner Tablet: Sí':''}`:'Sin recomendación para la configuración actual.';
  document.getElementById(tab+'_status').className=play?'status-msg ok':'status-msg bad';
}
function actualizarPlan(tab){readInputs(tab); if(!validate(tab)){document.getElementById(tab+'_status').textContent='No se actualizó: Distribución de canales y Mix de productos deben sumar 100%.';document.getElementById(tab+'_status').className='status-msg bad';return;} render(tab);}
function showTab(tab){activeTab=tab;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(tab).classList.add('active');document.getElementById(tab==='cafe'?'tabCafe':'tabDt').classList.add('active');}
buildPage('cafe'); buildPage('dt');
</script>
</body>
</html>
